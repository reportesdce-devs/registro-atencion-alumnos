<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel de coordinadores</title>
<style>
:root{--bg:#e9e9e9;--card:#fff;--line:#e7e7e7;--dark:#292929;--muted:#969696}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Segoe UI,Arial,sans-serif;color:var(--dark)}
.shell{max-width:1280px;margin:38px auto;padding:0 20px}.app{background:#f8f8f8;padding:28px}.top{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:20px}
.brand{display:flex;align-items:center;gap:14px}.logo{width:42px;height:42px;border-radius:9px;display:grid;place-items:center;background:var(--dark);color:#fff;font-size:.8rem;font-weight:800}
.brand h1{margin:0;font-size:1.15rem}.brand p{margin:4px 0 0;color:var(--muted);font-size:.82rem}
button{border:0;border-radius:10px;padding:11px 15px;font:inherit;font-weight:700;cursor:pointer}.dark{background:var(--dark);color:#fff}.soft{background:#ececec;color:#555}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}.card{background:var(--card);border:1px solid #ededed;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.05)}
.stat{padding:18px}.stat span{font-size:.84rem;color:#555}.stat strong{display:block;font-size:1.7rem;margin:8px 0}.stat small{color:var(--muted)}
.main{padding:22px}.head{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;margin-bottom:16px}.head h2{margin:0 0 4px;font-size:1rem}.head p{margin:0;color:var(--muted);font-size:.83rem}
.filters{display:grid;grid-template-columns:1.4fr .8fr .9fr auto;gap:10px;margin-bottom:16px}input,select{width:100%;border:1px solid var(--line);background:#fafafa;border-radius:10px;padding:11px 12px;font:inherit}
.error{display:none;margin-bottom:14px;padding:13px;border-radius:9px;background:#f8e8e8;color:#8b1f1f;border-left:4px solid #8b1f1f;font-weight:700}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px}table{width:100%;border-collapse:collapse;min-width:1100px}
th,td{padding:12px;border-bottom:1px solid #efefef;text-align:left;font-size:.85rem}th{background:#f7f7f7;color:#777;font-size:.78rem}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;background:#efefef;font-size:.72rem;font-weight:800}
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}.empty{text-align:center;color:var(--muted);padding:28px}
@media(max-width:1000px){.stats{grid-template-columns:repeat(2,1fr)}.filters{grid-template-columns:1fr 1fr}}@media(max-width:600px){.stats,.filters{grid-template-columns:1fr}.app{padding:18px}}
</style>
</head>
<body><div class="shell"><main class="app">
<div class="top"><div class="brand"><div class="logo">DCE</div><div><h1>Panel de coordinadores</h1><p>Registro general de atención a alumnos</p></div></div><button class="dark" id="downloadTop">Descargar reporte</button></div>
<section class="stats">
<article class="card stat"><span>Visitas totales</span><strong id="total">0</strong><small>Registros acumulados</small></article>
<article class="card stat"><span>IQ</span><strong id="countIQ">0</strong><small>Visitas registradas</small></article>
<article class="card stat"><span>ISND</span><strong id="countISND">0</strong><small>Visitas registradas</small></article>
<article class="card stat"><span>IM</span><strong id="countIM">0</strong><small>Visitas registradas</small></article>
<article class="card stat"><span>II</span><strong id="countII">0</strong><small>Visitas registradas</small></article>
</section>
<section class="card main">
<div class="head"><div><h2>Alumnos registrados</h2><p id="countText">0 registros</p></div><button class="soft" id="refresh">Actualizar</button></div>
<div id="error" class="error"></div>
<div class="filters"><input id="search" placeholder="Buscar por ID o nombre completo"><select id="career"><option value="">Todas las carreras</option><option>IQ</option><option>ISND</option><option>IM</option><option>II</option></select><input id="date" type="date"><button class="soft" id="clear">Limpiar filtros</button></div>
<div class="table-wrap"><table><thead><tr><th>Folio</th><th>Fecha</th><th>Hora</th><th>ID</th><th>Nombre completo</th><th>Carrera</th><th>Sigla</th><th>Motivo de visita</th></tr></thead><tbody id="body"></tbody></table></div>
<div class="actions"><button class="dark" id="download">Descargar reporte CSV</button><button class="soft" id="summary">Descargar resumen por carrera</button></div>
</section></main></div>
<script src="config.js"></script>
<script>
const $=id=>document.getElementById(id);let visits=[];
function api(){const u=window.APP_CONFIG?.API_URL||'';if(!u||u.includes('PEGA_AQUI'))throw new Error('Falta configurar la URL de Apps Script en config.js.');return u}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
async function load(){try{$('error').style.display='none';const r=await fetch(`${api()}?action=list&t=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error('No se pudo conectar con Google Sheets.');const j=await r.json();if(!j.ok)throw new Error(j.error||'No se pudieron cargar los registros.');visits=j.data||[];render()}catch(e){visits=[];$('error').textContent=e.message;$('error').style.display='block';render()}}
function filtered(){const q=$('search').value.trim().toLowerCase(),c=$('career').value,d=$('date').value;return visits.filter(v=>(!q||`${v.id} ${v.nombre} ${v.motivo}`.toLowerCase().includes(q))&&(!c||v.sigla===c)&&(!d||v.fechaISO===d))}
function render(){const total=visits.length;$('total').textContent=total;['IQ','ISND','IM','II'].forEach(c=>$('count'+c).textContent=visits.filter(v=>v.sigla===c).length);const rows=filtered();$('countText').textContent=`${rows.length} registro${rows.length===1?'':'s'}`;$('body').innerHTML=rows.length?rows.map(v=>`<tr><td>${esc(v.folio)}</td><td>${esc(v.fecha)}</td><td>${esc(v.hora)}</td><td><strong>${esc(v.id)}</strong></td><td>${esc(v.nombre)}</td><td>${esc(v.carrera)}</td><td><span class="badge">${esc(v.sigla)}</span></td><td>${esc(v.motivo)}</td></tr>`).join(''):'<tr><td colspan="8" class="empty">No hay registros para mostrar.</td></tr>'}
function csv(name,rows){const text=rows.map(r=>r.map(x=>`"${String(x??'').replaceAll('"','""')}"`).join(',')).join('\n');const b=new Blob(["\uFEFF"+text],{type:'text/csv;charset=utf-8;'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href)}
function detail(){const r=filtered();if(!r.length){alert('No hay registros para descargar.');return}csv('reporte_visitas_alumnos.csv',[['Folio','Fecha','Hora','ID','Nombre completo','Carrera','Sigla','Motivo'],...r.map(v=>[v.folio,v.fecha,v.hora,v.id,v.nombre,v.carrera,v.sigla,v.motivo])])}
['search','career','date'].forEach(id=>{$(id).oninput=render;$(id).onchange=render});$('clear').onclick=()=>{['search','career','date'].forEach(id=>$(id).value='');render()};$('refresh').onclick=load;$('download').onclick=detail;$('downloadTop').onclick=detail;$('summary').onclick=()=>{const r=[['Carrera','Visitas']];['IQ','ISND','IM','II'].forEach(c=>r.push([c,visits.filter(v=>v.sigla===c).length]));r.push(['TOTAL',visits.length]);csv('resumen_visitas_por_carrera.csv',r)};load();
</script></body></html>
