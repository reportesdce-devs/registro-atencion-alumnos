<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Registro de visita</title>
<style>
:root{--bg:#e9e9e9;--card:#fff;--line:#e7e7e7;--dark:#292929;--muted:#969696}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:var(--bg);font-family:Segoe UI,Arial,sans-serif;color:var(--dark)}
.app{width:min(680px,100%);background:#f8f8f8;padding:28px}.brand{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.logo{width:42px;height:42px;border-radius:9px;display:grid;place-items:center;background:var(--dark);color:#fff;font-size:.8rem;font-weight:800}
.brand h1{margin:0;font-size:1.15rem}.brand p{margin:4px 0 0;color:var(--muted);font-size:.82rem}
.card{background:var(--card);border:1px solid #ededed;border-radius:16px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,.05)}
h2{margin:0 0 6px;font-size:1.15rem}.desc{margin:0 0 24px;color:var(--muted);font-size:.88rem}
label{display:block;margin-bottom:8px;font-size:.87rem;font-weight:700}input,select{width:100%;border:1px solid var(--line);background:#fafafa;border-radius:12px;padding:16px;font:inherit;outline:none}
input{font-size:1.22rem}.field{margin-top:20px}.career-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.career{border:1px solid var(--line);background:#fafafa;border-radius:12px;padding:21px 8px;font:inherit;font-weight:800;cursor:pointer}
.career.active{background:var(--dark);color:#fff;border-color:var(--dark)}.actions{display:flex;gap:10px;margin-top:24px}
.primary,.secondary{border:0;border-radius:11px;padding:14px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{flex:1;background:var(--dark);color:#fff}.secondary{background:#ececec;color:#555}
.message{display:none;margin-top:16px;padding:14px;border-radius:10px;background:#f8e8e8;color:#8b1f1f;border-left:4px solid #8b1f1f;font-weight:700}
.success{display:none;text-align:center;padding:42px 16px}.icon{width:66px;height:66px;margin:0 auto 17px;border-radius:50%;display:grid;place-items:center;background:var(--dark);color:#fff;font-size:1.8rem}
@media(max-width:600px){.career-grid{grid-template-columns:1fr 1fr}.app{padding:18px}.card{padding:22px}}
</style>
</head>
<body>
<main class="app">
<div class="brand"><div class="logo">DCE</div><div><h1>Registro de visita</h1><p>División de Ciencias Exactas</p></div></div>
<section class="card" id="formCard">
<h2>Registra tu visita</h2><p class="desc">Captura tu ID, selecciona tu carrera y el motivo de la visita.</p>
<form id="form">
<label for="id">ID del alumno</label><input id="id" inputmode="numeric" autocomplete="off" placeholder="Ej. 22627" required>
<div class="field"><label>Carrera</label><div class="career-grid">
<button type="button" class="career" data-value="IQ">IQ</button>
<button type="button" class="career" data-value="ISND">ISND</button>
<button type="button" class="career" data-value="IM">IM</button>
<button type="button" class="career" data-value="II">II</button>
</div><input id="career" type="hidden"></div>
<div class="field"><label for="reason">Motivo de visita</label><select id="reason" required>
<option value="">Selecciona una opción</option><option>Revisión de avance académico</option><option>Dudas del plan de estudios</option><option>Dudas sobre materias</option><option>Carga o selección de materias</option><option>Sesión de mentoría</option><option>Regularización académica</option><option>Prácticas profesionales</option><option>Servicio social</option><option>Dudas académicas generales</option><option>Otro</option>
</select></div>
<div class="actions"><button class="primary" id="submit" type="submit">Registrar visita</button><button class="secondary" type="reset">Limpiar</button></div>
<div id="message" class="message"></div>
</form></section>
<section class="card success" id="success"><div class="icon">✓</div><h2>Visita registrada</h2><p id="successText">La página intentará cerrarse automáticamente.</p></section>
</main>
<script src="config.js"></script>
<script>
const career=document.getElementById('career'),buttons=document.querySelectorAll('.career'),form=document.getElementById('form'),submit=document.getElementById('submit');
function api(){const u=window.APP_CONFIG?.API_URL||'';if(!u||u.includes('PEGA_AQUI'))throw new Error('Falta configurar la URL de Apps Script en config.js.');return u}
function error(t){const m=document.getElementById('message');m.textContent=t;m.style.display='block'}
buttons.forEach(b=>b.onclick=()=>{buttons.forEach(x=>x.classList.remove('active'));b.classList.add('active');career.value=b.dataset.value;document.getElementById('message').style.display='none'});
form.onreset=()=>{buttons.forEach(x=>x.classList.remove('active'));career.value='';document.getElementById('message').style.display='none'};
form.onsubmit=async e=>{e.preventDefault();if(!career.value){error('Selecciona una carrera.');return}
submit.disabled=true;submit.textContent='Registrando...';
try{
const q=new URLSearchParams({action:'register',id:document.getElementById('id').value.trim(),carrera:career.value,motivo:document.getElementById('reason').value});
const r=await fetch(`${api()}?${q}`,{cache:'no-store'});if(!r.ok)throw new Error('No se pudo conectar con Google Sheets.');
const j=await r.json();if(!j.ok)throw new Error(j.error||'No se pudo registrar la visita.');
document.getElementById('formCard').style.display='none';document.getElementById('success').style.display='block';
setTimeout(()=>{window.open('','_self');window.close();setTimeout(()=>document.getElementById('successText').textContent='Registro completado. Puedes cerrar esta pestaña.',500)},1200);
}catch(ex){error(ex.message);submit.disabled=false;submit.textContent='Registrar visita'}
};
</script></body></html>
